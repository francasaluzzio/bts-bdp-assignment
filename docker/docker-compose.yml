services:
  db:
    image: postgres:16
    container_name: bdi-postgres
    environment:
      POSTGRES_USER: bdi
      POSTGRES_PASSWORD: bdi123
      POSTGRES_DB: bdi_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - bdi_net

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bdi-app
    environment:
      BDI_DB_URL: postgresql+psycopg2://bdi:bdi123@db:5432/bdi_db
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - bdi_net

volumes:
  pg_data:

networks:
  bdi_net: